replicaCount: 1
image:
  repository: lifestyle-service
  pullPolicy: IfNotPresent
  tag: "latest"
imagePullSecrets: [ ]
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  automount: true
  annotations: { }
  name: ""
podAnnotations: { }
podLabels: { }

podSecurityContext: { }

securityContext: { }
service:
  type: ClusterIP
  port: 8080
ingress:
  enabled: true
  className: kong
  annotations:
    konghq.com/strip-path: "true"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: [ ]
httpRoute:
  enabled: false
  annotations: { }
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers

resources: { }
livenessProbe:
  httpGet:
    path: /q/health/live
    port: http
readinessProbe:
  httpGet:
    path: /q/health/ready
    port: http
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
volumes: [ ]
volumeMounts: [ ]

nodeSelector: { }

tolerations: [ ]

affinity: { }
